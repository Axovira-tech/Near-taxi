name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare site files
        run: |
          mkdir -p _site
          shopt -s nullglob
          html_files=(*.html)
          if [ ${#html_files[@]} -gt 0 ]; then
            cp -r "${html_files[@]}" _site/
          fi
          for path in assets css js; do
            if [ -e "$path" ]; then
              cp -r "$path" _site/
            fi
          done
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
